name: Daily Media Monitor

on:
  schedule:
    # 6:00 UTC odpovídá 8:00 SELČ (letní čas v ČR)
    - cron: '0 6 * * *'
  workflow_dispatch: # Ponechává tlačítko pro ruční spuštění v GitHub Actions

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repozitáře
        uses: actions/checkout@v4

      - name: Nastavení Pythonu
        uses: actions/setup-python@v5
        with:
          python-language: '3.11'

      - name: Instalace knihoven
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Spuštění skriptu Media Monitor
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python media_monitor.py
