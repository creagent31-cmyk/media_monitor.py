name: Weekly Media Monitor - Cresco Real Estate

on:
  schedule:
    - cron: '0 6 * * 1'  # Každé pondělí v 6:00 UTC = 8:00 nášho času
  workflow_dispatch:      # Umožňuje spustit i ručně

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Načtení kódu
        uses: actions/checkout@v4

      - name: Nastavení Pythonu
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalace knihoven
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 openpyxl pandas lxml

      - name: Spuštění media monitoru
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python media_monitor.py
