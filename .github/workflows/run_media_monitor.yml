name: Run Media Monitor

on:
  schedule:
    # Spouští se každý den v 8:00 ráno UTC (upravte si čas dle potřeby)
    - cron: '0 8 * * *'
  workflow_dispatch: # Umožňuje spustit skript ručně přes tlačítko v Actions

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 openpyxl pandas lxml

      - name: Run media monitor script
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python media_monitor.py
